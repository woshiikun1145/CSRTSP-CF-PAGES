        if (from === to) return false;

        if (from === '异次元之家' || to === '异次元之家') return false;

    function showModal(title, bodyHtml, onConfirm) {
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `<h3>${title}</h3>${bodyHtml}`;
        modal.style.display = 'flex';
        const confirmBtn = document.getElementById('modalConfirm');
        const cancelBtn = document.getElementById('modalCancel');
        confirmBtn.onclick = async () => {
            if (onConfirm) await onConfirm();
            closeModal();
        };
        cancelBtn.onclick = closeModal;
        document.querySelector('.modal .close').onclick = closeModal;
        window.onclick = (e) => { if (e.target === modal) closeModal(); };
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function drawAuxiliaryElements() {
        if (!svg) return;
        if (!showGrid && !showAxes) return;
        let step = 100;
        const range = Math.max(viewBox.width, viewBox.height);
        if (range > 2000) step = 500;
        else if (range > 1000) step = 200;
        else if (range > 500) step = 100;
        else step = 50;
        const startX = Math.floor(viewBox.x / step) * step;
        const startZ = Math.floor(viewBox.y / step) * step;
        const endX = viewBox.x + viewBox.width;
        const endZ = viewBox.y + viewBox.height;
        if (showGrid) {
            for (let x = startX; x <= endX; x += step) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x);
                line.setAttribute('y1', viewBox.y);
                line.setAttribute('x2', x);
                line.setAttribute('y2', viewBox.y + viewBox.height);
                line.setAttribute('stroke', '#ccc');
                line.setAttribute('stroke-width', '0.5');
                line.setAttribute('stroke-dasharray', '4 4');
                svg.appendChild(line);
            }
            for (let z = startZ; z <= endZ; z += step) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', viewBox.x);
                line.setAttribute('y1', z);
                line.setAttribute('x2', viewBox.x + viewBox.width);
                line.setAttribute('y2', z);
                line.setAttribute('stroke', '#ccc');
                line.setAttribute('stroke-width', '0.5');
                line.setAttribute('stroke-dasharray', '4 4');
                svg.appendChild(line);
            }
        }
        if (showAxes) {
            if (0 >= viewBox.y && 0 <= viewBox.y + viewBox.height) {
                const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                xAxis.setAttribute('x1', viewBox.x);
                xAxis.setAttribute('y1', 0);
                xAxis.setAttribute('x2', viewBox.x + viewBox.width);
                xAxis.setAttribute('y2', 0);
                xAxis.setAttribute('stroke', '#f44336');
                xAxis.setAttribute('stroke-width', '2');
                svg.appendChild(xAxis);
            }
            if (0 >= viewBox.x && 0 <= viewBox.x + viewBox.width) {
                const zAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                zAxis.setAttribute('x1', 0);
                zAxis.setAttribute('y1', viewBox.y);
                zAxis.setAttribute('x2', 0);
                zAxis.setAttribute('y2', viewBox.y + viewBox.height);
                zAxis.setAttribute('stroke', '#2196f3');
                zAxis.setAttribute('stroke-width', '2');
                svg.appendChild(zAxis);
            }
        }
    }

    async function loadData() {
        stations = [];
        lines = [];
        operators = [];
        transfers = [];
        if (svg) svg.innerHTML = '';
        const stationListAdmin = document.getElementById('stationListAdmin');
        if (stationListAdmin) stationListAdmin.innerHTML = '';
        const lineListAdmin = document.getElementById('lineListAdmin');
        if (lineListAdmin) lineListAdmin.innerHTML = '';
        const transferListAdmin = document.getElementById('transferListAdmin');
        if (transferListAdmin) transferListAdmin.innerHTML = '';

        const { data: stationsData, error: sErr } = await sb.from('stations').select('*');
        const { data: linesData, error: lErr } = await sb.from('lines').select('*');
        const { data: operatorsData, error: oErr } = await sb.from('operators').select('*');
        const { data: transfersData, error: tErr } = await sb.from('transfers').select('*');

        if (!sErr) stations = stationsData || [];
        if (!lErr) lines = linesData || [];
        if (!oErr) operators = operatorsData || [];
        if (!tErr) transfers = transfersData || [];

        updateStationDatalist();
        renderMap();
        renderAdminLists();
    }

    function updateStationDatalist() {
        const datalist = document.getElementById('stationList');
        datalist.innerHTML = '';
        stations.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.name;
            datalist.appendChild(opt);
        });
    }

    function drawPolyline(points, lineColor, lineWidth, dashArray) {
        if (!points.length) return;
        const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        const pointsStr = points.map(p => `${p[0]},${p[1]}`).join(' ');
        polyline.setAttribute('points', pointsStr);
        polyline.setAttribute('stroke', lineColor);
        polyline.setAttribute('stroke-width', lineWidth);
        polyline.setAttribute('fill', 'none');
        polyline.setAttribute('stroke-linecap', 'round');
        if (dashArray) polyline.setAttribute('stroke-dasharray', dashArray);
        return polyline;
    }

    function renderMap() {
        if (!svg) svg = document.getElementById('subwayMap');
        svg.innerHTML = '';
        drawAuxiliaryElements();

        if (!stations.length) return;

        // 计算当前维度站点的坐标范围
        let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
        stations.filter(s => s.dimension === currentDimension).forEach(s => {
            minX = Math.min(minX, s.x);
            maxX = Math.max(maxX, s.x);
            minZ = Math.min(minZ, s.z);
            maxZ = Math.max(maxZ, s.z);
        });
        const padding = 60;
        const rangeX = maxX - minX || 1;
        const rangeZ = maxZ - minZ || 1;
        if (!viewBox.width || viewBox.width === 800) {
            viewBox = {
                x: minX - padding,
                y: minZ - padding,
                width: rangeX + 2 * padding,
                height: rangeZ + 2 * padding
            };
            updateViewBox();
        }

        const linesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const stationsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const portalsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const transfersGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');

        // 收集所有线段（包含折点和传送门），用于共线偏移
        const allSegments = [];

        lines.forEach(line => {
            const order = line.station_order;
            const breakpoints = line.breakpoints || [];
            const portals = line.portals || [];
            // 按线段索引分组折点和传送门
            const breakpointsBySeg = {};
            breakpoints.forEach(bp => { if (!breakpointsBySeg[bp.segment]) breakpointsBySeg[bp.segment] = []; breakpointsBySeg[bp.segment].push(bp); });
            const portalsBySeg = {};
            portals.forEach(p => { if (!portalsBySeg[p.segment]) portalsBySeg[p.segment] = []; portalsBySeg[p.segment].push(p); });

            // 绘制常规线段（相邻站点）
            for (let i = 0; i < order.length - 1; i++) {
                const from = stations.find(s => s.id === order[i]);
                const to = stations.find(s => s.id === order[i+1]);
                if (!from || !to) continue;
                if (from.dimension !== currentDimension || to.dimension !== currentDimension) continue;

                const segBreak = breakpointsBySeg[i] || [];
                const segPortals = portalsBySeg[i] || [];
                segPortals.sort((a,b) => {
                    const fromPt = { x: from.x, z: from.z };
                    const toPt = { x: to.x, z: to.z };
                    const distA = Math.hypot(a.x - fromPt.x, a.z - fromPt.z);
                    const distB = Math.hypot(b.x - fromPt.x, b.z - fromPt.z);
                    return distA - distB;
                });
                let points = [[from.x, from.z]];
                for (const bp of segBreak) points.push([bp.x, bp.z]);
                for (const portal of segPortals) points.push([portal.x, portal.z]);
                points.push([to.x, to.z]);

                const dash = line.type === '单轨铁路' ? '8 4' : (line.type === '蓝冰船' ? '2 6' : (line.type === '长距铁路' ? '' : ''));
                const baseWidth = line.type === '长距铁路' ? 3 : 5;
                allSegments.push({
                    points: points,
                    lineColor: line.color,
                    dash: dash,
                    baseWidth: baseWidth
                });
            }

            // 绘制环线首尾连接（如果 is_loop 为 true）
            if (line.is_loop && order.length >= 2) {
                const first = stations.find(s => s.id === order[0]);
                const last = stations.find(s => s.id === order[order.length - 1]);
                if (first && last && first.dimension === currentDimension && last.dimension === currentDimension) {
                    const segIndex = order.length; // 使用一个特殊的索引，比如 order.length
                    const segBreak = breakpointsBySeg[segIndex] || [];
                    const segPortals = portalsBySeg[segIndex] || [];
                    segPortals.sort((a,b) => {
                        const fromPt = { x: last.x, z: last.z };
                        const toPt = { x: first.x, z: first.z };
                        const distA = Math.hypot(a.x - fromPt.x, a.z - fromPt.z);
                        const distB = Math.hypot(b.x - fromPt.x, b.z - fromPt.z);
                        return distA - distB;
                    });
                    let points = [[last.x, last.z]];
                    for (const bp of segBreak) points.push([bp.x, bp.z]);
                    for (const portal of segPortals) points.push([portal.x, portal.z]);
                    points.push([first.x, first.z]);

                    const dash = line.type === '单轨铁路' ? '8 4' : (line.type === '蓝冰船' ? '2 6' : (line.type === '长距铁路' ? '' : ''));
                    const baseWidth = line.type === '长距铁路' ? 3 : 5;
                    allSegments.push({
                        points: points,
                        lineColor: line.color,
                        dash: dash,
                        baseWidth: baseWidth
                    });
                }
            }
        });

        // 共线偏移绘制（标准化线段并分组）
        const normalizedMap = new Map();
        allSegments.forEach(seg => {
            const points = seg.points;
            if (points.length < 2) return;
            const forward = points.map(p => `${p[0]},${p[1]}`).join('|');
            const backward = points.slice().reverse().map(p => `${p[0]},${p[1]}`).join('|');
            const key = forward < backward ? forward : backward;
            if (!normalizedMap.has(key)) normalizedMap.set(key, []);
            normalizedMap.get(key).push(seg);
        });

        normalizedMap.forEach(segGroup => {
            const count = segGroup.length;
            if (count === 1) {
                const seg = segGroup[0];
                const polyline = drawPolyline(seg.points, seg.lineColor, seg.baseWidth, seg.dash);
                if (polyline) linesGroup.appendChild(polyline);
            } else {
                // 共线偏移
                const step = 2;
                const offsets = [];
                for (let i = 0; i < count; i++) {
                    offsets.push((i - (count-1)/2) * step);
                }
                segGroup.forEach((seg, idx) => {
                    const offset = offsets[idx];
                    const newPoints = [];
                    for (let i = 0; i < seg.points.length; i++) {
                        const p = seg.points[i];
                        let dir = [0,0];
                        if (i === 0) {
                            const next = seg.points[i+1];
                            dir = [next[0] - p[0], next[1] - p[1]];
                        } else if (i === seg.points.length - 1) {
                            const prev = seg.points[i-1];
                            dir = [p[0] - prev[0], p[1] - prev[1]];
                        } else {
                            const prev = seg.points[i-1];
                            const next = seg.points[i+1];
                            const dir1 = [p[0] - prev[0], p[1] - prev[1]];
                            const dir2 = [next[0] - p[0], next[1] - p[1]];
                            dir = [(dir1[0] + dir2[0])/2, (dir1[1] + dir2[1])/2];
                        }
                        const len = Math.hypot(dir[0], dir[1]);
                        if (len < 1e-6) {
                            newPoints.push([p[0], p[1]]);
                           continue;
                        }
                        const perp = [-dir[1] / len, dir[0] / len];
                        const dx = perp[0] * offset;
                        const dy = perp[1] * offset;
                        newPoints.push([p[0] + dx, p[1] + dy]);
                    }
                    const lineWidth = Math.max(1, seg.baseWidth / count);
                    const polyline = drawPolyline(newPoints, seg.lineColor, lineWidth, seg.dash);
                    if (polyline) linesGroup.appendChild(polyline);
                });
            }
        });

        // 绘制站外换乘（浅灰色虚线，同维度）
        transfers.forEach(transfer => {
            const from = stations.find(s => s.id === transfer.from_station);
            const to = stations.find(s => s.id === transfer.to_station);
            if (from && to && from.dimension === currentDimension && to.dimension === currentDimension) {
                const points = [[from.x, from.z], [to.x, to.z]];
                const polyline = drawPolyline(points, '#aaa', 2, '4 4');
                if (polyline) transfersGroup.appendChild(polyline);
            }
        });

        // 绘制传送门方块（只显示当前维度作为起点的传送门，且仅当允许跨维度）
        lines.forEach(line => {
            const portals = line.portals || [];
            portals.forEach(portal => {
                const order = line.station_order;
                const fromStation = stations.find(s => s.id === order[portal.segment]);
                if (fromStation && fromStation.dimension === currentDimension && CROSS_DIMENSION_ALLOWED(fromStation.dimension, portal.targetDim)) {
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    const size = 14;
                    rect.setAttribute('x', portal.x - size/2);
                    rect.setAttribute('y', portal.z - size/2);
                    rect.setAttribute('width', size);
                    rect.setAttribute('height', size);
                    rect.setAttribute('class', 'portal-box');
                    rect.setAttribute('rx', '2');
                    rect.style.cursor = 'pointer';
                    rect.addEventListener('click', async () => {
                        const targetDim = portal.targetDim;
                        if (targetDim === currentDimension) return;
                        currentDimension = targetDim;
                        document.getElementById('dimensionSelect').value = targetDim;
                        await loadData();
                        const container = document.getElementById('svgWrapper');
                        const rect = container.getBoundingClientRect();
                        const scaleX = viewBox.width / rect.width;
                        const scaleY = viewBox.height / rect.height;
                        viewBox.x = portal.targetX - (rect.width / 2) * scaleX;
                        viewBox.y = portal.targetZ - (rect.height / 2) * scaleY;
                        updateViewBox();
                        renderMap();
                    });
                    portalsGroup.appendChild(rect);
                }
            });
        });

        // 绘制站点
        stations.filter(s => s.dimension === currentDimension).forEach(station => {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', station.x);
            circle.setAttribute('cy', station.z);
            circle.setAttribute('r', '6');
            circle.setAttribute('fill', 'white');
            circle.setAttribute('stroke', '#2c3e66');
            circle.setAttribute('stroke-width', '2');
            circle.style.cursor = 'pointer';
            circle.addEventListener('mouseenter', (e) => {
                const linesThrough = lines.filter(line => line.station_order.includes(station.id));
                const linesInfo = linesThrough.map(l => `${l.name} (${l.type}, ${l.operator || '未知集团'})`).join(', ');
                tooltipDiv.innerHTML = `🚉 ${station.name}<br>坐标: X=${station.x}, Z=${station.z}<br>🔄 途经线路: ${linesInfo || '无'}<br>维度: ${station.dimension}`;
                tooltipDiv.style.left = (e.pageX + 12) + 'px';
                tooltipDiv.style.top = (e.pageY - 30) + 'px';
                tooltipDiv.style.display = 'block';
            });
            circle.addEventListener('mousemove', (e) => {
                tooltipDiv.style.left = (e.pageX + 12) + 'px';
                tooltipDiv.style.top = (e.pageY - 30) + 'px';
            });
            circle.addEventListener('mouseleave', () => { tooltipDiv.style.display = 'none'; });
            stationsGroup.appendChild(circle);
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', station.x + 8);
            text.setAttribute('y', station.z - 4);
            text.setAttribute('font-size', '12');
            text.setAttribute('fill', '#1e3c72');
            text.setAttribute('stroke', 'white');
            text.setAttribute('stroke-width', '0.5');
            text.textContent = station.name;
            stationsGroup.appendChild(text);
        });

        svg.appendChild(transfersGroup);
        svg.appendChild(portalsGroup);
        svg.appendChild(linesGroup);
        svg.appendChild(stationsGroup);
    }

    function zoomIn() {
        const container = document.getElementById('svgWrapper');
        const rect = container.getBoundingClientRect();
        const containerAspect = rect.width / rect.height;
        const newWidth = viewBox.width * 0.8;
        const newHeight = newWidth / containerAspect;
        const centerX = viewBox.x + viewBox.width / 2;
        const centerY = viewBox.y + viewBox.height / 2;
        viewBox.x = centerX - newWidth / 2;
        viewBox.y = centerY - newHeight / 2;
        viewBox.width = newWidth;
        viewBox.height = newHeight;
        updateViewBox();
        renderMap();
    }

    function zoomOut() {
        const container = document.getElementById('svgWrapper');
        const rect = container.getBoundingClientRect();
        const containerAspect = rect.width / rect.height;
        const newWidth = viewBox.width * 1.25;
        const newHeight = newWidth / containerAspect;
        const centerX = viewBox.x + viewBox.width / 2;
        const centerY = viewBox.y + viewBox.height / 2;
        viewBox.x = centerX - newWidth / 2;
        viewBox.y = centerY - newHeight / 2;
        viewBox.width = newWidth;
        viewBox.height = newHeight;
        updateViewBox();
        renderMap();
    }

    function resetView() {
        if (!stations.length) return;
        let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
        stations.filter(s => s.dimension === currentDimension).forEach(s => {
            minX = Math.min(minX, s.x);
            maxX = Math.max(maxX, s.x);
            minZ = Math.min(minZ, s.z);
            maxZ = Math.max(maxZ, s.z);
        });
        const padding = 60;
        const rangeX = maxX - minX || 1;
        const rangeZ = maxZ - minZ || 1;
        viewBox = {
            x: minX - padding,
            y: minZ - padding,
            width: rangeX + 2 * padding,
            height: rangeZ + 2 * padding
        };
        updateViewBox();
        renderMap();
    }

    function initPanZoom() {
        svg = document.getElementById('subwayMap');
        const container = document.getElementById('svgWrapper');
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 1.1 : 0.9;
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const scaleX = viewBox.width / rect.width;
            const scaleY = viewBox.height / rect.height;
            const svgX = viewBox.x + mouseX * scaleX;
            const svgY = viewBox.y + mouseY * scaleY;
            let newWidth = viewBox.width * delta;
            let newHeight = viewBox.height * delta;
            newWidth = Math.min(2000, Math.max(200, newWidth));
            newHeight = Math.min(1500, Math.max(150, newHeight));
            viewBox.x = svgX - (mouseX * (newWidth / rect.width));
            viewBox.y = svgY - (mouseY * (newHeight / rect.height));
            viewBox.width = newWidth;
            viewBox.height = newHeight;
            updateViewBox();
            renderMap();
        });
        container.addEventListener('mousedown', (e) => {
            if (e.target === svg || e.target.closest('svg')) {
                isPanning = true;
                startPoint = { x: e.clientX, y: e.clientY };
                startViewBox = { x: viewBox.x, y: viewBox.y };
                container.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });
        container.addEventListener('touchstart', (e) => {
            if (e.target === svg || e.target.closest('svg')) {
                e.preventDefault();
                isPanning = true;
                const touch = e.touches[0];
                startPoint = { x: touch.clientX, y: touch.clientY };
                startViewBox = { x: viewBox.x, y: viewBox.y };
                container.style.cursor = 'grabbing';
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - startPoint.x;
            const dy = touch.clientY - startPoint.y;
            const scaleX = viewBox.width / container.clientWidth;
            const scaleY = viewBox.height / container.clientHeight;
            viewBox.x = startViewBox.x - dx * scaleX;
            viewBox.y = startViewBox.y - dy * scaleY;
            updateViewBox();
            renderMap();
        });
        window.addEventListener('touchend', () => {
            isPanning = false;
            container.style.cursor = 'grab';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            const dx = e.clientX - startPoint.x;
            const dy = e.clientY - startPoint.y;
            const scaleX = viewBox.width / container.clientWidth;
            const scaleY = viewBox.height / container.clientHeight;
            viewBox.x = startViewBox.x - dx * scaleX;
            viewBox.y = startViewBox.y - dy * scaleY;
            updateViewBox();
            renderMap();
        });
        window.addEventListener('mouseup', () => { isPanning = false; container.style.cursor = 'grab'; });
        svg.addEventListener('click', (e) => {
            const rect = svg.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const scaleX = viewBox.width / rect.width;
            const scaleY = viewBox.height / rect.height;
            const worldX = viewBox.x + mouseX * scaleX;
            const worldZ = viewBox.y + mouseY * scaleY;
            document.getElementById('coordDisplay').innerHTML = `点击坐标: X=${worldX.toFixed(1)}, Z=${worldZ.toFixed(1)}`;
        });
    }

    function updateViewBox() { svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`); }

    // 路线规划（含环线和站外换乘，不考虑末地/异次元跨维度）
    async function planRoute() {
        const start = document.getElementById('startStation').value.trim();
        const end = document.getElementById('endStation').value.trim();
        if (!start || !end) { alert('请填写起点和终点'); return; }

        const graph = {};

        function addEdge(a, b, weight) {
            if (!graph[a]) graph[a] = [];
            if (!graph[b]) graph[b] = [];
            graph[a].push({ node: b, weight });
            graph[b].push({ node: a, weight });
        }

        // 1. 铁路线路边
        lines.forEach(line => {
            const order = line.station_order;
            for (let i = 0; i < order.length - 1; i++) {
                const a = order[i];
                const b = order[i+1];
                const stationA = stations.find(s => s.id === a);
                const stationB = stations.find(s => s.id === b);
                if (stationA && stationB && stationA.dimension === stationB.dimension) {
                    const dist = Math.hypot(stationA.x - stationB.x, stationA.z - stationB.z);
                    addEdge(a, b, dist);
                }
            }
            if (line.is_loop && order.length >= 2) {
                const a = order[0];
                const b = order[order.length-1];
                const stationA = stations.find(s => s.id === a);
                const stationB = stations.find(s => s.id === b);
                if (stationA && stationB && stationA.dimension === stationB.dimension) {
                    const dist = Math.hypot(stationA.x - stationB.x, stationA.z - stationB.z);
                    addEdge(a, b, dist);
                }
            }
        });

        // 2. 站外换乘边
        transfers.forEach(transfer => {
            const a = transfer.from_station;
            const b = transfer.to_station;
            const stationA = stations.find(s => s.id === a);
            const stationB = stations.find(s => s.id === b);
            if (stationA && stationB && stationA.dimension === stationB.dimension) {
                const weight = transfer.weight !== undefined ? transfer.weight : Math.hypot(stationA.x - stationB.x, stationA.z - stationB.z);
                addEdge(a, b, weight);
            }
        });

        // 3. 跨维度传送门边（仅当允许跨维度）
        lines.forEach(line => {
            const portals = line.portals || [];
            portals.forEach(portal => {
                const order = line.station_order;
                const fromStation = stations.find(s => s.id === order[portal.segment]);
                const toStation = stations.find(s => s.id === order[portal.segment+1]); // 注意：传送门连接两个站点，但实际目标坐标可能不是站点，为简化，我们只处理站点间边
                if (fromStation && toStation && fromStation.dimension !== toStation.dimension && CROSS_DIMENSION_ALLOWED(fromStation.dimension, toStation.dimension)) {
                    // 传送门成本固定为 100（可配置）
                    addEdge(fromStation.id, toStation.id, 100);
                }
            });
        });

        const startStation = stations.find(s => s.name === start);
        const endStation = stations.find(s => s.name === end);
        if (!startStation || !endStation) { alert('站点不存在'); return; }

        const dist = {};
        const prev = {};
        const visited = new Set();
        const nodes = stations.map(s => s.id);
        for (const node of nodes) dist[node] = Infinity;
        dist[startStation.id] = 0;

        while (true) {
            let minNode = null;
            let minDist = Infinity;
            for (const node of nodes) {
                if (!visited.has(node) && dist[node] < minDist) {
                    minDist = dist[node];
                    minNode = node;
                }
            }
            if (minNode === null) break;
            visited.add(minNode);
            if (minNode === endStation.id) break;
            const neighbors = graph[minNode] || [];
            for (const neighbor of neighbors) {
                const alt = dist[minNode] + neighbor.weight;
                if (alt < dist[neighbor.node]) {
                    dist[neighbor.node] = alt;
                    prev[neighbor.node] = minNode;
                }
            }
        }

        if (dist[endStation.id] === Infinity) {
            document.getElementById('planResult').innerHTML = '<span style="color:red">❌ 未找到路径</span>';
            return;
        }

        const pathIds = [];
        let cur = endStation.id;
        while (cur !== undefined) {
            pathIds.unshift(cur);
            cur = prev[cur];
        }
        const pathStations = pathIds.map(id => stations.find(s => s.id === id));
        let html = `<strong>✅ 最短路径 (${pathStations.length}站) 总距离: ${dist[endStation.id].toFixed(1)}</strong><br>`;
        html += pathStations.map((p, i) => `${i+1}. ${p.name} (${p.dimension})`).join('<br>');
        document.getElementById('planResult').innerHTML = html;
    }

    async function deleteStation() {
        if (!stations.length) { alert('暂无站点'); return; }

            const id = document.getElementById('staId').value;
            if (!confirm('删除站点将从所有线路中移除，确定吗？')) return;
            for (const line of lines) {
                if (line.station_order.includes(parseInt(id))) {
                    const newOrder = line.station_order.filter(sid => sid != id);
                    await sb.from('lines').update({ station_order: newOrder }).eq('id', line.id);
                }
            }
            await sb.from('transfers').delete().or(`from_station.eq.${id},to_station.eq.${id}`);
            const { error } = await sb.from('stations').delete().eq('id', id);
            if (error) alert(error.message);
            else { alert('删除成功'); closeModal(); await loadData(); }
        });
    }

    // 折点编辑器函数（与之前相同，略）
    function renderBreakpointsEditor(selectedStationIds, existingBreakpoints) {
        const segments = [];
        for (let i = 0; i < selectedStationIds.length - 1; i++) {
            const from = stations.find(s => s.id === selectedStationIds[i]);
            const to = stations.find(s => s.id === selectedStationIds[i+1]);
            const fromName = from ? from.name : '?';
            const toName = to ? to.name : '?';
            const bpList = (existingBreakpoints || []).filter(bp => bp.segment === i);
            segments.push(`
                <div class="breakpoints-section" data-segment="${i}">
                    <div class="segment-title">第 ${i+1} 段：${fromName} → ${toName}</div>
                    <div id="bp-list-${i}" class="bp-list">
                        ${bpList.map((bp, idx) => `
                            <div class="bp-item" data-idx="${idx}">
                                <input type="number" id="bp_${i}_${idx}_x" name="bp_${i}_${idx}_x" class="bp-x" value="${bp.x}" placeholder="X" style="width:70px">
                                <input type="number" id="bp_${i}_${idx}_z" name="bp_${i}_${idx}_z" class="bp-z" value="${bp.z}" placeholder="Z" style="width:70px">
                                <button type="button" class="small-btn remove-bp">删除</button>
                            </div>
                        `).join('')}
                    </div>
                    <button type="button" class="small-btn add-bp" data-segment="${i}">+ 添加折点</button>
                </div>
            `);
        }
        return segments.join('');
    }

    function collectBreakpointsFromEditor(selectedStationIds) {
        const segments = selectedStationIds.length - 1;
        const breakpoints = [];
        for (let i = 0; i < segments; i++) {
            const container = document.getElementById(`bp-list-${i}`);
            if (container) {
                const items = container.querySelectorAll('.bp-item');
                items.forEach(item => {
                    const xInput = item.querySelector('.bp-x');
                    const zInput = item.querySelector('.bp-z');
                    const x = parseFloat(xInput.value);
                    const z = parseFloat(zInput.value);
                    if (!isNaN(x) && !isNaN(z)) {
                        breakpoints.push({ segment: i, x, z });
                    }
                });
            }
        }
        return breakpoints;
    }

    function bindBreakpointsEvents(selectedStationIds) {
        document.querySelectorAll('.add-bp').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                const segment = parseInt(btn.getAttribute('data-segment'));
                const listDiv = document.getElementById(`bp-list-${segment}`);
                const idx = listDiv.children.length;
                const newItem = document.createElement('div');
                newItem.className = 'bp-item';
                newItem.innerHTML = `

                    <input type="number" id="bp_${segment}_${idx}_z" name="bp_${segment}_${idx}_z" class="bp-z" placeholder="Z" style="width:70px">
                    <button type="button" class="small-btn remove-bp">删除</button>
                `;
                listDiv.appendChild(newItem);
                bindRemoveEvents();
            };
        });

            document.querySelectorAll('.remove-bp').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    btn.closest('.bp-item').remove();
                };
            });

    }

    async function addLine() {
        const lineTypes = ['单轨铁路', '双轨铁路', '蓝冰船', '长距铁路'];
        const safeStations = Array.isArray(stations) ? stations : [];
        const safeOperators = Array.isArray(operators) ? operators : [];
        const stationOptions = safeStations.map(s => `<option value="${s.id}">${s.name} (${s.dimension})</option>`).join('');
        const operatorOptions = safeOperators.map(op => `<option value="${op.name}">${op.name}</option>`).join('');
        const dimOptions = DIMENSIONS.map(d => `<option value="${d}">${d}</option>`).join('');
        showModal('添加线路', `
            <label>线路名称</label><input id="lineName">
            <label>线路类型</label><select id="lineType">${lineTypes.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
            <label>线路颜色</label><input type="color" id="lineColor" value="#888888">
            <label>运营集团</label><select id="operator"><option value="">无</option>${operatorOptions}</select>
            <label>线路所属维度</label>
            <select id="lineDimension">${dimOptions}</select>
            <label><input type="checkbox" id="isLoopCheckbox"> 环线（首尾相连）</label>
            <label>站点顺序 (按住Ctrl多选，按顺序点击选择)</label>
            <select id="stationOrderSelect" multiple size="6">${stationOptions}</select>
            <div id="breakpointsEditorArea"></div>
            <div id="portalsEditorArea"></div>
            <small>提示：折点用于弯曲线路，传送门仅在不同维度线段上可用（末地、异次元除外）。</small>
        `, async () => {
            const name = document.getElementById('lineName').value;
            const type = document.getElementById('lineType').value;
            const color = document.getElementById('lineColor').value;
            const operator = document.getElementById('operator').value;
            const dimension = document.getElementById('lineDimension').value;
            const isLoop = document.getElementById('isLoopCheckbox').checked;
            const selected = Array.from(document.getElementById('stationOrderSelect').selectedOptions);
            const station_order = selected.map(opt => parseInt(opt.value));
            if (!name || !type || !color) { alert('请填写完整'); return; }
            if (station_order.length < 2) { alert('至少选择两个站点'); return; }
            // 检查站点维度一致性
            const stationsInLine = station_order.map(id => safeStations.find(s => s.id === id));
            if (stationsInLine.some(s => s.dimension !== dimension)) {
                alert('所选站点必须与线路维度一致');
                return;
            }
            const breakpoints = collectBreakpointsFromEditor(station_order);
            const portals = [];
            for (let i = 0; i < station_order.length - 1; i++) {
                const portalsData = document.getElementById(`portalsData_${i}`)?.value;
                if (portalsData) {
                    const segPortals = JSON.parse(portalsData);
                    portals.push(...segPortals);
                }
            }
            const { error } = await sb.from('lines').insert([{
                name, station_order, type, color, operator,
                dimension, is_loop: isLoop,
                breakpoints: breakpoints,
                portals: portals
            }]);
            if (error) alert(error.message);
            else { alert('添加成功'); closeModal(); await loadData(); }
        });
        setTimeout(() => {
            const stationSelect = document.getElementById('stationOrderSelect');
            const breakpointsArea = document.getElementById('breakpointsEditorArea');
            const portalsArea = document.getElementById('portalsEditorArea');
            function updateEditors() {
                const selected = Array.from(stationSelect.selectedOptions);
                const ids = selected.map(opt => parseInt(opt.value));
                if (ids.length < 2) {
                    breakpointsArea.innerHTML = '<div style="color:gray;">选择至少两个站点以添加折点</div>';
                    portalsArea.innerHTML = '';
                    return;
                }
                const stationsInOrder = ids.map(id => safeStations.find(s => s.id === id));
                breakpointsArea.innerHTML = renderBreakpointsEditor(ids, []);
                bindBreakpointsEvents(ids);
                let portalsHtml = '';
                for (let i = 0; i < ids.length - 1; i++) {
                    const from = stationsInOrder[i];
                    const to = stationsInOrder[i+1];
                    if (from.dimension !== to.dimension && CROSS_DIMENSION_ALLOWED(from.dimension, to.dimension)) {
                        portalsHtml += `<div style="border:1px solid #ddd; border-radius:12px; padding:8px; margin:8px 0;">
                            <div class="segment-title">传送门 (跨维度) ${i+1}: ${from.name} (${from.dimension}) → ${to.name} (${to.dimension})</div>
                            <div id="portalsList_${i}"></div>
                            <button type="button" class="small-btn addPortalBtn" data-seg="${i}">➕ 添加传送门</button>
                            <input type="hidden" id="portalsData_${i}" value="[]">
                        </div>`;
                    } else {
                        portalsHtml += `<div style="margin:8px 0; color:gray;">线段 ${i+1} 两端维度相同或不允许跨维度，无需传送门。</div>`;
                    }
                }
                portalsArea.innerHTML = portalsHtml;
                for (let i = 0; i < ids.length - 1; i++) {
                    const from = stationsInOrder[i];
                    const to = stationsInOrder[i+1];
                    if (from.dimension !== to.dimension && CROSS_DIMENSION_ALLOWED(from.dimension, to.dimension)) {
                        attachPortalEvents(i, from, to);
                    }
                }
            }
            function attachPortalEvents(segIndex, fromStation, toStation) {
                const container = document.getElementById(`portalsList_${segIndex}`);
                const hiddenInput = document.getElementById(`portalsData_${segIndex}`);
                let portals = [];
                function renderPortals() {
                    container.innerHTML = '';
                    portals.forEach((p, idx) => {
                        const div = document.createElement('div');
                        div.className = 'bp-item';
                        div.innerHTML = `
                            <span>位置: X=${p.x.toFixed(1)}, Z=${p.z.toFixed(1)}</span>
                            <span>目标维度: ${p.targetDim}</span>
                            <span>目标坐标: (${p.targetX.toFixed(1)}, ${p.targetZ.toFixed(1)})</span>
                            <button class="small-btn removePortalBtn" data-idx="${idx}">删除</button>
                        `;
                        container.appendChild(div);
                    });
                    hiddenInput.value = JSON.stringify(portals);
                    document.querySelectorAll('.removePortalBtn').forEach(btn => {
                        btn.onclick = () => {
                            const idx = parseInt(btn.dataset.idx);
                            portals.splice(idx, 1);
                            renderPortals();
                        };
                    });
                }
                function addPortal() {
                    const midX = (fromStation.x + toStation.x) / 2;
                    const midZ = (fromStation.z + toStation.z) / 2;
                    let targetDim = '主世界';
                    let targetX = midX, targetZ = midZ;
                    if (fromStation.dimension === '主世界') targetDim = '下界';
                    else if (fromStation.dimension === '下界') targetDim = '主世界';
                    else if (fromStation.dimension === '资源世界') targetDim = '主世界'; // 资源世界只能传出到主世界
                    if ((fromStation.dimension === '主世界' && targetDim === '下界') ||
                        (fromStation.dimension === '下界' && targetDim === '主世界')) {
                        if (fromStation.dimension === '主世界') { targetX = midX / 8; targetZ = midZ / 8; }
                        else { targetX = midX * 8; targetZ = midZ * 8; }
                    } else if (fromStation.dimension === '资源世界') {
                        // 资源世界目标坐标需手动输入
                        targetX = midX;
                        targetZ = midZ;
                    }
                    const modalHtml = `
                        <label>传送门位置 X</label><input id="portalX" type="number" step="any" value="${midX}">
                        <label>传送门位置 Z</label><input id="portalZ" type="number" step="any" value="${midZ}">
                        <label>目标维度</label>
                        <select id="targetDim">
                            <option value="主世界" ${targetDim==='主世界'?'selected':''}>主世界</option>
                            <option value="下界" ${targetDim==='下界'?'selected':''}>下界</option>
                            <option value="资源世界" ${targetDim==='资源世界'?'selected':''}>资源世界</option>
                        </select>
                        <label>目标坐标 X</label><input id="targetX" type="number" step="any" value="${targetX}">
                        <label>目标坐标 Z</label><input id="targetZ" type="number" step="any" value="${targetZ}">
                        <small>资源世界只能作为起点，目标不能是资源世界。主世界↔下界可自动换算。</small>
                    `;
                    showModal('添加传送门', modalHtml, () => {
                        const x = parseFloat(document.getElementById('portalX').value);
                        const z = parseFloat(document.getElementById('portalZ').value);
                        const tDim = document.getElementById('targetDim').value;
                        let tX = parseFloat(document.getElementById('targetX').value);
                        let tZ = parseFloat(document.getElementById('targetZ').value);
                        if (isNaN(x) || isNaN(z) || isNaN(tX) || isNaN(tZ)) { alert('坐标无效'); return; }
                        if (fromStation.dimension === '资源世界' && tDim === '资源世界') { alert('资源世界不能作为传送门目标'); return; }
                        if (fromStation.dimension !== '资源世界' && tDim === '资源世界') { alert('只有资源世界可以传出，不能传入资源世界'); return; }
                        if (!CROSS_DIMENSION_ALLOWED(fromStation.dimension, tDim)) {
                            alert('末地和异次元不允许跨维度传送');
                            return;
                        }
                        portals.push({ segment: segIndex, x, z, targetDim: tDim, targetX: tX, targetZ: tZ });
                        renderPortals();
                        closeModal();
                    });
                }
                document.querySelector(`.addPortalBtn[data-seg="${segIndex}"]`).onclick = addPortal;
                renderPortals();
            }
            stationSelect.addEventListener('change', updateEditors);
            updateEditors();
        }, 50);
    }

    async function editLine(lineId) {
    const line = lines.find(l => l.id === lineId);
    if (!line) return;
    const lineTypes = ['单轨铁路', '双轨铁路', '蓝冰船', '长距铁路'];

        <label>站点顺序 (按住Ctrl多选，按顺序点击选择，可增删站点)</label>

        <small>提示：折点用于弯曲线路，传送门仅在不同维度线段上可用（末地、异次元除外）。</small>
    `, async () => {

        if (station_order.length < 2) { alert('至少选择两个站点'); return; }
        // 检查站点维度一致性
        const stationsInLine = station_order.map(id => safeStations.find(s => s.id === id));
        if (stationsInLine.some(s => s.dimension !== dimension)) {

            if (portalsData) {
                const segPortals = JSON.parse(portalsData);
                portals.push(...segPortals);
            }
        }
        const { error } = await sb.from('lines').update({
            name, station_order, type, color, operator,
            dimension, is_loop: isLoop,
            breakpoints: breakpoints,
            portals: portals
        }).eq('id', lineId);

    });

    setTimeout(() => {

        // 选中当前线路的站点

            let portalsHtml = '';
            for (let i = 0; i < ids.length - 1; i++) {

                const to = stationsInOrder[i+1];
                if (from.dimension !== to.dimension && CROSS_DIMENSION_ALLOWED(from.dimension, to.dimension)) {

                    </div>`;
                } else {
                    portalsHtml += `<div style="margin:8px 0; color:gray;">线段 ${i+1} 两端维度相同或不允许跨维度，无需传送门。</div>`;
                }
            }
            portalsArea.innerHTML = portalsHtml;
            for (let i = 0; i < ids.length - 1; i++) {
                const from = stationsInOrder[i];
                const to = stationsInOrder[i+1];
                if (from.dimension !== to.dimension && CROSS_DIMENSION_ALLOWED(from.dimension, to.dimension)) {
                    attachPortalEvents(i, from, to);
                }
            }
        }
        function attachPortalEvents(segIndex, fromStation, toStation) {
            const container = document.getElementById(`portalsList_${segIndex}`);
            const hiddenInput = document.getElementById(`portalsData_${segIndex}`);
            let portals = JSON.parse(hiddenInput.value);
            function renderPortals() {
                container.innerHTML = '';
                portals.forEach((p, idx) => {
                    const div = document.createElement('div');
                    div.className = 'bp-item';
                    div.innerHTML = `
                        <span>位置: X=${p.x.toFixed(1)}, Z=${p.z.toFixed(1)}</span>
                        <span>目标维度: ${p.targetDim}</span>
                        <span>目标坐标: (${p.targetX.toFixed(1)}, ${p.targetZ.toFixed(1)})</span>
                        <button class="small-btn removePortalBtn" data-idx="${idx}">删除</button>
                    `;
                    container.appendChild(div);
                });
                hiddenInput.value = JSON.stringify(portals);
                document.querySelectorAll('.removePortalBtn').forEach(btn => {
                    btn.onclick = () => {
                        const idx = parseInt(btn.dataset.idx);
                        portals.splice(idx, 1);
                        renderPortals();
                    };
                });
            }
            function addPortal() {
                const midX = (fromStation.x + toStation.x) / 2;
                const midZ = (fromStation.z + toStation.z) / 2;
                let targetDim = '主世界';
                let targetX = midX, targetZ = midZ;
                if (fromStation.dimension === '主世界') targetDim = '下界';
                else if (fromStation.dimension === '下界') targetDim = '主世界';
                else if (fromStation.dimension === '资源世界') targetDim = '主世界';
                if ((fromStation.dimension === '主世界' && targetDim === '下界') ||
                    (fromStation.dimension === '下界' && targetDim === '主世界')) {
                    if (fromStation.dimension === '主世界') { targetX = midX / 8; targetZ = midZ / 8; }
                    else { targetX = midX * 8; targetZ = midZ * 8; }
                } else if (fromStation.dimension === '资源世界') {
                    targetX = midX;
                    targetZ = midZ;
                }
                const modalHtml = `
                    <label>传送门位置 X</label><input id="portalX" type="number" step="any" value="${midX}">
                    <label>传送门位置 Z</label><input id="portalZ" type="number" step="any" value="${midZ}">
                    <label>目标维度</label>
                    <select id="targetDim">
                        <option value="主世界" ${targetDim==='主世界'?'selected':''}>主世界</option>
                        <option value="下界" ${targetDim==='下界'?'selected':''}>下界</option>
                        <option value="资源世界" ${targetDim==='资源世界'?'selected':''}>资源世界</option>
                    </select>
                    <label>目标坐标 X</label><input id="targetX" type="number" step="any" value="${targetX}">
                    <label>目标坐标 Z</label><input id="targetZ" type="number" step="any" value="${targetZ}">
                `;
                showModal('添加传送门', modalHtml, () => {
                    const x = parseFloat(document.getElementById('portalX').value);
                    const z = parseFloat(document.getElementById('portalZ').value);
                    const tDim = document.getElementById('targetDim').value;
                    let tX = parseFloat(document.getElementById('targetX').value);
                    let tZ = parseFloat(document.getElementById('targetZ').value);
                    if (isNaN(x) || isNaN(z) || isNaN(tX) || isNaN(tZ)) { alert('坐标无效'); return; }
                    if (fromStation.dimension === '资源世界' && tDim === '资源世界') { alert('资源世界不能作为传送门目标'); return; }
                    if (fromStation.dimension !== '资源世界' && tDim === '资源世界') { alert('只有资源世界可以传出，不能传入资源世界'); return; }
                    if (!CROSS_DIMENSION_ALLOWED(fromStation.dimension, tDim)) {
                        alert('末地和异次元不允许跨维度传送');
                        return;
                    }
                    portals.push({ segment: segIndex, x, z, targetDim: tDim, targetX: tX, targetZ: tZ });
                    renderPortals();
                    closeModal();
                });
            }
            document.querySelector(`.addPortalBtn[data-seg="${segIndex}"]`).onclick = addPortal;
            renderPortals();
        }
        stationSelect.addEventListener('change', updateEditors);
        updateEditors();
    }, 50);
}

    async function deleteLine(lineId) {
        if (!confirm('确定删除该线路吗？')) return;
        const { error } = await sb.from('lines').delete().eq('id', lineId);
        if (error) alert(error.message);
        else { alert('删除成功'); await loadData(); }
    }

    async function orderLine() {
        if (!lines.length) { alert('暂无线路'); return; }
        showModal('调整线路站点顺序', `
            <label>选择线路</label>
            <select id="lineSelect">${lines.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}</select>
            <div id="orderContainer"></div>
        `, null, true);
        const lineSelect = document.getElementById('lineSelect');
        const orderContainer = document.getElementById('orderContainer');
        let currentOrder = [];
        function renderOrder(stationIds) {
            const stationsInOrder = stationIds.map(id => stations.find(s => s.id === id)).filter(s => s);
            orderContainer.innerHTML = `
                <div style="margin:10px 0;">
                    ${stationsInOrder.map((s, idx) => `
                        <div style="display:flex; justify-content:space-between; margin:6px 0; padding:6px; background:#f5f5f5; border-radius:8px;">
                            <span><strong>${idx+1}.</strong> ${s.name}</span>
                            <div>
                                <button class="small-btn upBtn" data-idx="${idx}" ${idx===0 ? 'disabled' : ''}>▲</button>
                                <button class="small-btn downBtn" data-idx="${idx}" ${idx===stationIds.length-1 ? 'disabled' : ''}>▼</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <button id="saveOrderBtn" class="small-btn">保存顺序</button>
            `;
            document.querySelectorAll('.upBtn').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (idx > 0) {
                        [stationIds[idx-1], stationIds[idx]] = [stationIds[idx], stationIds[idx-1]];
                        renderOrder(stationIds);
                    }
                };
            });
            document.querySelectorAll('.downBtn').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (idx < stationIds.length-1) {
                        [stationIds[idx], stationIds[idx+1]] = [stationIds[idx+1], stationIds[idx]];
                        renderOrder(stationIds);
                    }
                };
            });
            document.getElementById('saveOrderBtn').onclick = async () => {
                const { error } = await sb.from('lines').update({ station_order: stationIds }).eq('id', lineSelect.value);
                if (error) alert(error.message);
                else { alert('顺序已更新'); closeModal(); await loadData(); }
            };
        }
        lineSelect.onchange = () => {
            const line = lines.find(l => l.id == lineSelect.value);
            if (line) { currentOrder = [...line.station_order]; renderOrder(currentOrder); }
        };
        lineSelect.dispatchEvent(new Event('change'));
    }

    async function addOperator() {
        showModal('添加运营集团', `
            <label>集团名称</label><input id="opName">
            <label>集团图标</label><input id="opIcon" placeholder="Emoji、图片URL 或 Base64 DataURL（例如 data:image/png;base64,...）">
            <small>支持 Emoji、图片URL 或 Base64 字符串。</small>
        `, async () => {
            const name = document.getElementById('opName').value.trim();
            const icon = document.getElementById('opIcon').value.trim();
            if (!name) { alert('请填写名称'); return; }
            const { error } = await sb.from('operators').insert([{ name, icon: icon || null }]);
            if (error) alert(error.message);
            else { alert('添加成功'); closeModal(); await loadData(); }
        });
    }

    async function editOperator() {
        if (!operators.length) { alert('暂无集团'); return; }
        const operatorOptions = operators.map(op => `<option value="${op.id}">${op.name}</option>`).join('');
        showModal('编辑运营集团', `
            <label>选择集团</label>
            <select id="editOpSelect">${operatorOptions}</select>
            <label>新名称</label><input id="newOpName" placeholder="请输入新名称">
            <label>新图标</label><input id="newOpIcon" placeholder="Emoji、图片URL 或 Base64 DataURL">
            <small>支持 Emoji、图片URL 或 Base64 字符串。</small>
        `, async () => {
            const id = document.getElementById('editOpSelect').value;
            const newName = document.getElementById('newOpName').value.trim();
            const newIcon = document.getElementById('newOpIcon').value.trim();
            const oldOp = operators.find(op => op.id == id);
            if (!oldOp) { alert('未找到该集团'); return; }
            const updateData = {};
            if (newName) updateData.name = newName;
            if (newIcon !== undefined) updateData.icon = newIcon === '' ? null : newIcon;
            if (Object.keys(updateData).length === 0) { alert('请至少修改一项'); return; }
            if (newName) {
                await sb.from('lines').update({ operator: newName }).eq('operator', oldOp.name);
            }
            const { error } = await sb.from('operators').update(updateData).eq('id', id);
            if (error) alert(error.message);
            else { alert('修改成功'); closeModal(); await loadData(); }
        });
    }

    async function deleteOperator() {
        if (!operators.length) { alert('暂无集团'); return; }
        showModal('删除运营集团', `<label>选择集团</label><select id="opSelect">${operators.map(op => `<option value="${op.id}">${op.name}</option>`).join('')}</select>`, async () => {
            const id = document.getElementById('opSelect').value;
            const used = lines.some(l => l.operator === operators.find(op => op.id == id)?.name);
            if (used) { alert('该集团仍被线路使用，无法删除'); return; }
            const { error } = await sb.from('operators').delete().eq('id', id);
            if (error) alert(error.message);
            else { alert('删除成功'); closeModal(); await loadData(); }
        });
    }

    async function addTransfer() {
        const stationOptions = stations.map(s => `<option value="${s.id}">${s.name} (${s.dimension})</option>`).join('');
        showModal('添加站外换乘', `
            <label>起点站点</label>
            <select id="transferFrom">${stationOptions}</select>
            <label>终点站点</label>
            <select id="transferTo">${stationOptions}</select>
            <label>步行距离（可选，默认根据坐标自动计算）</label>
            <input type="number" id="transferWeight" step="0.1" placeholder="留空则自动计算">
            <small>注意：两站之间可双向换乘，系统会自动处理。</small>
        `, async () => {
            const from = parseInt(document.getElementById('transferFrom').value);
            const to = parseInt(document.getElementById('transferTo').value);
            let weight = parseFloat(document.getElementById('transferWeight').value);
            if (from === to) { alert('起点和终点不能相同'); return; }
            const fromSt = stations.find(s => s.id === from);
            const toSt = stations.find(s => s.id === to);
            if (!fromSt || !toSt || fromSt.dimension !== toSt.dimension) {
                alert('两个站点必须属于同一维度');
                return;
            }
            const exists = transfers.some(t => (t.from_station === from && t.to_station === to) || (t.from_station === to && t.to_station === from));
            if (exists) { alert('该换乘关系已存在'); return; }
            if (isNaN(weight)) {
                weight = Math.hypot(fromSt.x - toSt.x, fromSt.z - toSt.z);
            }
            const { error } = await sb.from('transfers').insert([{
                from_station: from,
                to_station: to,
                weight: weight,
                dimension: fromSt.dimension
            }]);
            if (error) alert(error.message);
            else { alert('添加成功'); closeModal(); await loadData(); }
        });
    }

    async function deleteTransfer() {
        if (!transfers.length) { alert('暂无换乘记录'); return; }
        showModal('删除站外换乘', `
            <label>选择换乘关系</label>
            <select id="transferSelect">${transfers.map(t => {
                const from = stations.find(s => s.id === t.from_station);
                const to = stations.find(s => s.id === t.to_station);
                return `<option value="${t.id}">${from.name} ⇄ ${to.name}</option>`;
            }).join('')}</select>
        `, async () => {
            const id = document.getElementById('transferSelect').value;
            if (!confirm('确定删除该换乘关系吗？')) return;
            const { error } = await sb.from('transfers').delete().eq('id', id);
            if (error) alert(error.message);
            else { alert('删除成功'); closeModal(); await loadData(); }
        });
    }

    async function changeDimension() {
        currentDimension = document.getElementById('dimensionSelect').value;
        await loadData();
    }

    function jumpToCoordinate() {
        let x = parseFloat(document.getElementById('jumpX').value);
        let z = parseFloat(document.getElementById('jumpZ').value);
        if (isNaN(x)) x = 0;
        if (isNaN(z)) z = 0;
        const container = document.getElementById('svgWrapper');
        const rect = container.getBoundingClientRect();
        const scaleX = viewBox.width / rect.width;
        const scaleY = viewBox.height / rect.height;
        viewBox.x = x - (rect.width / 2) * scaleX;
        viewBox.y = z - (rect.height / 2) * scaleY;
        updateViewBox();
        renderMap();
    }

    function bindEvents() {
        document.getElementById('planBtn').onclick = planRoute;
        document.getElementById('refreshBtn').onclick = changeDimension;
        document.getElementById('addStationBtn').onclick = addStation;
        document.getElementById('editStationBtn').onclick = editStation;
        document.getElementById('deleteStationBtn').onclick = deleteStation;
        document.getElementById('addLineBtn').onclick = addLine;
        document.getElementById('editLineBtn').onclick = () => { if (lines.length) editLine(lines[0].id); else alert('暂无线路'); };
        document.getElementById('deleteLineBtn').onclick = () => { if (lines.length) deleteLine(lines[0].id); else alert('暂无线路'); };
        document.getElementById('orderLineBtn').onclick = orderLine;
        document.getElementById('addOperatorBtn').onclick = addOperator;
        document.getElementById('editOperatorBtn').onclick = editOperator;
        document.getElementById('deleteOperatorBtn').onclick = deleteOperator;
        document.getElementById('addTransferBtn').onclick = addTransfer;
        document.getElementById('deleteTransferBtn').onclick = deleteTransfer;
        document.getElementById('jumpBtn').onclick = jumpToCoordinate;
        document.getElementById('zoomInBtn').onclick = zoomIn;
        document.getElementById('zoomOutBtn').onclick = zoomOut;
        document.getElementById('resetViewBtn').onclick = resetView;

        const gridCheck = document.getElementById('showGridCheckbox');
        const axesCheck = document.getElementById('showAxesCheckbox');
        gridCheck.addEventListener('change', (e) => {
            showGrid = e.target.checked;
            renderMap();
        });
        axesCheck.addEventListener('change', (e) => {
            showAxes = e.target.checked;
            renderMap();
        });
    }

    async function init() {
        initPanZoom();
        tooltipDiv = document.createElement('div');
        tooltipDiv.className = 'tooltip';
        document.body.appendChild(tooltipDiv);
        await loadData();
        bindEvents();
    }
    init();
</script>
